services:
  frontend:
    image: photoservices-frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      BACKEND_URL: http://backend:3000
    depends_on:
      - backend

  backend:
    image: photoservices-backend:latest
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-photoservices_db}"
      S3_ENDPOINT: "http://garage:3900"
    depends_on:
      - postgres
      - garage

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-photoservices_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  garage:
    image: dxflrs/garage:v0.9.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3900:3900"
    environment:
      - GARAGE_ALLOW_WORLD_READABLE=1
    volumes:
      - ./garage_data:/var/lib/garage
      - ./garage.toml:/etc/garage.toml

volumes:
  postgres_data:
