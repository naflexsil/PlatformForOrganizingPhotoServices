# =============================================================================
# Nginx config — Platform for Organizing Photo Services
# Разместить на сервере: /etc/nginx/sites-available/photoservices
# Симлинк: ln -s /etc/nginx/sites-available/photoservices /etc/nginx/sites-enabled/
# =============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name psyshe.art www.psyshe.art;

    # Certbot challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name psyshe.art www.psyshe.art;

    # --- SSL (Let's Encrypt через certbot) ---
    ssl_certificate     /etc/letsencrypt/live/psyshe.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/psyshe.art/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Безопасность ---
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection      "1; mode=block";
    add_header Referrer-Policy       strict-origin-when-cross-origin;

    # --- Страница "Сайт в разработке" (server-side защита) ---
    # Снять комментарий пока сайт не готов к публичному доступу.
    # Создать пароль: sudo apt install apache2-utils && sudo htpasswd -c /etc/nginx/.htpasswd ИМЯ_ПОЛЬЗОВАТЕЛЯ
    auth_basic           "Site Under Development";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # --- Статика React (frontend/dist после npm run build) ---
    root  /var/www/photoservices/frontend/dist;
    index index.html;

    # Лимит загрузки файлов (фото могут быть тяжёлыми)
    client_max_body_size 50M;

    # React SPA — все неизвестные пути → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API proxy → Node.js backend (порт 3000) ---
    location /api/ {
        auth_basic off;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Загруженные файлы (пока не на S3) ---
    # Backend отдаёт /uploads через express.static
    location /uploads/ {
        auth_basic off;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- WebSocket (Socket.io для будущего чата) ---
    # Backend должен подключить socket.io: io.attach(server) и слушать тот же порт 3000.
    location /socket.io/ {
        auth_basic off;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Обязательные заголовки для апгрейда соединения до WebSocket
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Долгий таймаут — WebSocket-соединения живут долго
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # --- Health-check endpoint ---
    location /health {
        auth_basic off;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # --- Кеширование статики ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Запрет прямого доступа к .env и dot-файлам ---
    location ~ /\. {
        deny all;
        return 404;
    }
}
